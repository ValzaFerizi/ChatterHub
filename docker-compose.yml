version: '3.8'

services:
  # Node.js API
  api:
    build: .
    container_name: chatterhub_api
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - postgres
      - mongodb
      - redis
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: chatterhub_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # MongoDB
  mongodb:
    image: mongo:7
    container_name: chatterhub_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: chatterhub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data: