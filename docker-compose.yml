version: '3.8'

services:
  api:
    build: .
    container_name: chatterhub_api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DB_NAME=chatterhub
      - DB_USER=root
      - DB_PASSWORD=root123
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DIALECT=mysql
    depends_on:
      - mysql
      - mongodb
      - redis
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: chatterhub_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: chatterhub
      MYSQL_USER: chatterhub_user
      MYSQL_PASSWORD: chatterhub_pass123
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: chatterhub_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: chatterhub_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chatterhub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  mysql_data: